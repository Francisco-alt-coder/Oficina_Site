<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <title>Oficina Pro | Gestão Inteligente de Oficina</title>

  <meta
    name="description"
    content="Sistema profissional para gerenciamento de oficinas mecânicas, clientes, veículos e ordens de serviço."
  />
  <meta
    name="keywords"
    content="oficina mecânica, sistema oficina, gestão automotiva, carros, ordens de serviço"
  />
  <meta name="author" content="Francisco Wesley" />

  <meta property="og:title" content="Oficina Pro" />
  <meta property="og:description" content="Sistema moderno para gestão automotiva." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="pt_BR" />

  <meta name="theme-color" content="#030213" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      width: 100%;
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #f8fafc;
      color: #111827;
      overflow-x: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      min-height: 100vh;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      color: #374151;
      font-size: 16px;
      font-weight: 500;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #020617;
        color: #f8fafc;
      }

      #loading-screen {
        background: #020617;
      }

      .loading-text {
        color: #f8fafc;
      }
    }
  </style>
</head>

<body>
  <noscript>
    <div style="padding: 24px; text-align: center; font-family: Arial, sans-serif;">
      É necessário habilitar o JavaScript para utilizar o sistema.
    </div>
  </noscript>

  <div id="loading-screen">
    <div class="loading-container">
      <div class="spinner"></div>
      <div class="loading-text">Carregando Oficina Pro...</div>
    </div>
  </div>

  <div id="root"></div>

  <script type="module" src="/main.tsx"></script>
  <script>
    window.addEventListener("load", () => {
      const loading = document.getElementById("loading-screen");

      if (loading) {
        loading.style.opacity = "0";

        setTimeout(() => {
          loading.remove();
        }, 300);
      }
    });
  </script>
</body>
</html>
